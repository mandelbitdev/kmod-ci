---
name: out-of-tree virtme-ng matrix

"on":
  workflow_call:
    inputs:
      ci-repository:
        description: Deprecated; accepted for compatibility and ignored.
        required: false
        type: string
        default: ""
      ci-ref:
        description: Deprecated; accepted for compatibility and ignored.
        required: false
        type: string
        default: ""
      vng-repository:
        description: Repository containing the virtme-ng tree to test.
        required: false
        type: string
        default: arighi/virtme-ng
      vng-ref:
        description: Ref to check out from vng-repository.
        required: false
        type: string
        default: main
      cache-prefix:
        description: Prefix for successful scheduled-run cache entries.
        required: true
        type: string
      distros:
        description: JSON array of distro targets to test.
        required: false
        type: string
        default: >-
          ["debian-10","debian-11","debian-12","debian-13",
          "ubuntu-20.04","ubuntu-22.04","ubuntu-24.04",
          "ubuntu-25.10","ubuntu-26.04","fedora-44",
          "rhel-8","rhel-9","rhel-10",
          "opensuse-leap-15.6","opensuse-leap-16.0",
          "opensuse-tumbleweed"]
      arch:
        description: Host and guest architecture to test.
        required: false
        type: string
        default: x86_64
      guest-script:
        description: Executable script in the caller repo to run inside the VM.
        required: true
        type: string
      prepare-command:
        description: Optional caller-repo command to run before booting the VM.
        required: false
        type: string
        default: ""
      timeout-minutes:
        description: Per-target job timeout.
        required: false
        type: number
        default: 45
    secrets:
      RHEL_ORG_ID:
        required: false
      RHEL_ACTIVATION_KEY:
        required: false

permissions:
  contents: read

jobs:
  vng:
    name: ${{ matrix.distro }} ${{ matrix.arch }} rootfs
    runs-on: >-
      ${{
      matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04'
      }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    strategy:
      fail-fast: false
      matrix:
        arch: ["${{ inputs.arch }}"]
        distro: ${{ fromJSON(inputs.distros) }}
        exclude:
          # Leap 16.0 arm64 currently redirects repository metadata payloads
          # to broken mirrors, so keep x86_64 coverage and skip only arm64.
          - arch: arm64
            distro: opensuse-leap-16.0

    steps:
      - name: Validate architecture
        run: |
          case "${{ matrix.arch }}" in
          x86_64|arm64)
            ;;
          *)
            echo "Unsupported architecture: ${{ matrix.arch }}" >&2
            exit 1
            ;;
          esac

      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          path: repo

      - name: Checkout shared CI
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: kmod-ci

      - name: Install host dependencies
        run: |
          case "${{ matrix.arch }}" in
          x86_64)
            qemu_system=qemu-system-x86
            ;;
          arm64)
            qemu_system=qemu-system-arm
            ;;
          esac

          for attempt in 1 2 3; do
            if sudo apt-get update &&
              sudo apt-get install -y --no-install-recommends \
                busybox-static \
                ca-certificates \
                cpio \
                debian-archive-keyring \
                dnf \
                git \
                make \
                mmdebstrap \
                "${qemu_system}" \
                qemu-utils \
                rpm \
                rsync \
                ubuntu-keyring \
                virtiofsd \
                virtme-ng \
                zstd; then
              break
            fi

            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi

            echo "Host dependency install failed; retrying" >&2
            sleep 30
          done

      - name: Checkout virtme-ng
        run: |
          git clone \
            --depth 1 \
            --branch "${{ inputs.vng-ref }}" \
            "https://github.com/${{ inputs.vng-repository }}.git" \
            "${RUNNER_TEMP}/virtme-ng"
          git -C "${RUNNER_TEMP}/virtme-ng" rev-parse HEAD

      - name: Build ${{ matrix.distro }} rootfs
        env:
          KMOD_CI_ARCH: ${{ matrix.arch }}
          ROOTFS_PARENT: ${{ runner.temp }}/rootfs/${{ matrix.arch }}
          # RHEL differs from the public targets: rootfs-build.sh uses these
          # secrets inside a temporary UBI container to authenticate against
          # Red Hat CDN and generate the rootfs.
          RHEL_ORG_ID: ${{ secrets.RHEL_ORG_ID }}
          RHEL_ACTIVATION_KEY: ${{ secrets.RHEL_ACTIVATION_KEY }}
        run: |
          preserve_env=KMOD_CI_ARCH,RHEL_ORG_ID,RHEL_ACTIVATION_KEY
          sudo --preserve-env="${preserve_env}" \
            ./kmod-ci/scripts/rootfs-build.sh \
            "${{ matrix.distro }}" \
            "${ROOTFS_PARENT}/${{ matrix.distro }}"

      - name: Compute rootfs fingerprint
        id: rootfs-fingerprint
        env:
          KMOD_CI_ARCH: ${{ matrix.arch }}
          ROOTFS_PARENT: ${{ runner.temp }}/rootfs/${{ matrix.arch }}
        run: |
          # Build-rootfs is the source of truth for package selection. Compute
          # the scheduled-run cache key from the actual kernel it installed.
          fingerprint=$(./kmod-ci/scripts/rootfs-fingerprint.sh \
            "${{ matrix.distro }}" \
            "${ROOTFS_PARENT}/${{ matrix.distro }}" \
            "${GITHUB_SHA}")
          echo "hash=${fingerprint}" >> "${GITHUB_OUTPUT}"

      - name: Check previous scheduled result
        if: github.event_name == 'schedule'
        id: result-cache
        uses: actions/cache/restore@v5
        with:
          # Scheduled runs only need to rerun the caller payload when this exact
          # repo revision has not already passed with the generated rootfs.
          path: >-
            ${{ runner.temp }}/vng-cache/${{ matrix.arch }}/${{ matrix.distro }}
          key: >-
            ${{
            format('{0}-{1}-{2}-{3}',
            inputs.cache-prefix,
            matrix.arch,
            matrix.distro,
            steps.rootfs-fingerprint.outputs.hash)
            }}
          lookup-only: true

      - name: Skip unchanged scheduled target
        if: >-
          github.event_name == 'schedule' &&
          steps.result-cache.outputs.cache-hit == 'true'
        run: |
          # The payload step is skipped by its own 'if:' condition; this step
          # just leaves an explicit log message.
          echo "${{ matrix.distro }} already passed for this rootfs fingerprint"

      - name: Prepare caller repository
        if: >-
          steps.result-cache.outputs.cache-hit != 'true' &&
          inputs.prepare-command != ''
        working-directory: repo
        run: ${{ inputs.prepare-command }}

      - name: Run payload in ${{ matrix.distro }}
        if: steps.result-cache.outputs.cache-hit != 'true'
        env:
          KMOD_CI_ARCH: ${{ matrix.arch }}
          ROOTFS_PARENT: ${{ runner.temp }}/rootfs/${{ matrix.arch }}
        run: |
          payload_attempts=1
          vng_cpus=2

          if [ ! -e /dev/kvm ]; then
            # Without KVM the guest runs through QEMU emulation, which can
            # sporadically crash userspace during heavy compile/load steps.
            # Retry only that path once with a new guest boot and keep it
            # single-vCPU to reduce possible TCG/SMP noise.
            payload_attempts=2
            vng_cpus=1
          fi

          for attempt in $(seq 1 "${payload_attempts}"); do
            if sudo env \
              KMOD_CI_ARCH="${KMOD_CI_ARCH}" \
              VNG="${RUNNER_TEMP}/virtme-ng/vng" \
              VNG_CPUS="${vng_cpus}" \
              ./kmod-ci/scripts/run-guest.sh \
              "${{ matrix.distro }}" \
              "${ROOTFS_PARENT}/${{ matrix.distro }}" \
              "${GITHUB_WORKSPACE}/repo" \
              "${{ inputs.guest-script }}"; then
              exit 0
            fi

            rc="$?"

            if [ "${attempt}" -eq "${payload_attempts}" ]; then
              exit "${rc}"
            fi

            echo "Guest payload failed without KVM; retrying" >&2
          done

      - name: Record successful scheduled result
        if: >-
          github.event_name == 'schedule' &&
          steps.result-cache.outputs.cache-hit != 'true'
        run: |
          # Save a tiny marker only after the scheduled payload passes.
          cache_dir="${RUNNER_TEMP}/vng-cache/${{ matrix.arch }}"
          cache_dir="${cache_dir}/${{ matrix.distro }}"
          mkdir -p "${cache_dir}"
          printf '%s\n' \
            "${{ steps.rootfs-fingerprint.outputs.hash }}" \
            > "${cache_dir}/fingerprint"

      - name: Save successful scheduled result
        if: >-
          github.event_name == 'schedule' &&
          steps.result-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: >-
            ${{ runner.temp }}/vng-cache/${{ matrix.arch }}/${{ matrix.distro }}
          key: >-
            ${{
            format('{0}-{1}-{2}-{3}',
            inputs.cache-prefix,
            matrix.arch,
            matrix.distro,
            steps.rootfs-fingerprint.outputs.hash)
            }}
